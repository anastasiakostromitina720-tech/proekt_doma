name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: install · typecheck · lint · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Dummy values sufficient for zod validation, prisma validate, and next build.
      # Real secrets are never required to compile.
      NODE_ENV: development
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      WEB_ORIGIN: http://localhost:3000
      AUTH_JWT_ACCESS_SECRET: ci_access_secret_ci_access_secret_ci_access_secret
      AUTH_JWT_REFRESH_SECRET: ci_refresh_secret_ci_refresh_secret_ci_refresh_secret
      AUTH_COOKIE_SECURE: 'false'
      AUTH_COOKIE_SAMESITE: lax
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build contracts
        run: pnpm --filter @app/contracts build

      - name: Prisma validate
        run: pnpm --filter @app/api prisma:validate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build api
        run: pnpm --filter @app/api build

      - name: Build web
        run: pnpm --filter @app/web build
